<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Licenciaturas - Oferta Educativa - Universidad Catem</title>

    <link
      rel="icon"
      type="image/x-icon"
      href="../.../../../assets/isotipo.svg"
    />

    <link rel="stylesheet" href="../../css/of-edu-licenciatura.css" />
    <link rel="stylesheet" href="../../css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="UNIVERSIDAD CATEM" />
    <meta
      property="og:description"
      content="La Universidad de los trabajadores. Estudia donde quieras, cuando quieras."
    />
    <meta property="og:image" content="../../assets/imagotipo.svg" />
    <meta property="og:url" content="https://ucatem.mx/" />
    <meta property="og:site_name" content="Universidad CATEM" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <header class="header">
      <navigation-bar></navigation-bar>
    </header>

    <section
      class="hero"
      style="
        background: url(&quot;../../assets/hero-licenciaturas.png&quot;) top
          center / cover no-repeat;
      "
    >
      <div class="hero-overlay"></div>

      <div class="container hero-content">
        <div class="hero-text col start">
          <h1>Oferta educativa</h1>
          <p>Licenciaturas</p>
        </div>

        <div class="hero-features">
          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img
                  src="../../assets/check-white-icon.svg"
                  alt="Computadora"
                />
              </div>
              <div class="start">
                <p class="card-text">
                  Validez Oficial con
                  <span class="bold">RVOE</span>
                </p>
              </div>
            </div>
          </div>

          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img src="../../assets/calendar-icon.svg" alt="chat" />
              </div>
              <div class="start">
                <p class="card-text">
                  4 materias al mes,
                  <span class="bold"> termina en 1 año </span>
                </p>
              </div>
            </div>
          </div>

          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img src="../../assets/puzzle-icon.svg" alt="Graduación" />
              </div>
              <div class="start">
                <p class="card-text">
                  Cursa cualquier materia como <br />
                  <span class="bold">curso o diplomado independiente</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="programs section">
      <div class="container">
        <div class="section-heading center col">
          <h2>Conoce nuestros <span>programas educativos</span></h2>
          <p>
            Estudiar en CATEM significa equilibrar tus metas personales<br />
            y profesionales sin sacrificar ninguna
          </p>
        </div>

        <div class="program-grid">
          <licenciatura-card
            imagen="../../assets/lic-MAID.png"
            titulo="Mercadotecnia con Acentuación en Investigación y Docencia"
            text=""
            document="../../assets/Universidad CATEM - Portadas para brochure ejem.pdf"
          ></licenciatura-card>
          <licenciatura-card
            imagen="../../assets/lic-TAID.png"
            titulo="Turismo con Acentuación en Investigación y Docencia"
            text=""
            document="../../assets/Universidad CATEM - Portadas para brochure ejem.pdf"
          ></licenciatura-card>

          <licenciatura-card
            imagen="../../assets/lic-EAIGI.png"
            titulo="Educación con Acentuación en Investigación, Gestión e Innovación"
            text=""
            document="../../assets/Universidad CATEM - Portadas para brochure ejem.pdf"
          ></licenciatura-card>
          <licenciatura-card
            imagen="../../assets/lic-DAID.png"
            titulo="Derecho con Acentuación en Investigación y Docencia"
            text=""
            document="../../assets/Universidad CATEM - Portadas para brochure ejem.pdf"
          ></licenciatura-card>
        </div>
      </div>
    </section>

    <footer class="footer">
      <footer-component></footer-component>
    </footer>
  </body>

  <script type="module" src="../../components/index.js"></script>
</html>

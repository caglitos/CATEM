<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Licenciaturas - Oferta Educativa - Universidad Catem</title>

    <link rel="stylesheet" href="/css/of-edu-licenciatura.css" />
    <link rel="stylesheet" href="/css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <navigation-bar></navigation-bar>
    </header>

    <section
      class="hero"
      style="
        background: url(../../assets/hero-licenciaturas.png) top center / coverk
          no-repeat;
      "
    >
      <div class="hero-overlay"></div>

      <div class="container hero-content">
        <div class="hero-text col start">
          <h1>Oferta educativa</h1>
          <p>Licenciaturas</p>
        </div>

        <div class="hero-features">
          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img src="/assets/check-white-icon.svg" alt="Computadora" />
              </div>
              <div class="start">
                <p class="card-text">
                  Validez Oficial con
                  <span class="bold">RVOE</span>
                </p>
              </div>
            </div>
          </div>

          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img src="/assets/calendar-icon.svg" alt="chat" />
              </div>
              <div class="start">
                <p class="card-text">
                  4 materias al mes,
                  <span class="bold"> termina en 1 año </span>
                </p>
              </div>
            </div>
          </div>

          <div class="feature-card">
            <div class="col">
              <div class="end">
                <img src="/assets/puzzle-icon.svg" alt="Graduación" />
              </div>
              <div class="start">
                <p class="card-text">
                  Cursa cualquier materia como <br />
                  <span class="bold">curso o diplomado independiente</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <licenciatura-card
        title="Mercadotecnia con Acentuación
en Investigación y Docencia"
      ></licenciatura-card>
    </section>

    <footer class="footer">
      <footer-component></footer-component>
    </footer>
  </body>

  <script type="module" src="/components/index.js"></script>
</html>
